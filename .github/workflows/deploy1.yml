name: Deploy Theme to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      # Stamp the deploy number onto the theme version (deployed copy only —
      # the repo keeps the clean semantic version produced by `npm run release`).
      # Appearance → Themes then shows e.g. "1.2.0.53" = semver + build id, and
      # functions.php splits the two apart again (v5_digital_theme_version_parts()).
      #
      # Guard BEFORE stamping, not only after: the old pattern was `[0-9.]*`,
      # which also matched an already-stamped header and produced
      # "1.2.0.53.54". A post-check alone cannot tell "I stamped it" from "it
      # arrived stamped", so the clean 3-part header is asserted up front.
      #
      # The pattern requires LF (`$` right after the digits). The runner checks
      # out LF, so that holds; if it ever stops holding, the assertion fails the
      # deploy loudly instead of shipping an unstamped or mangled header.
      #
      # Do NOT switch to SemVer build metadata ("1.2.0+build.53"): PHP's
      # version_compare() sorts that BELOW "1.2.0".
      - name: Stamp build number on theme version
        run: |
          set -euo pipefail
          before="$(grep -m1 '^Version:' style.css || true)"
          if ! grep -qE '^Version: [0-9]+\.[0-9]+\.[0-9]+$' style.css; then
            echo "::error::style.css must carry a clean 3-part 'Version: X.Y.Z' header before deploy (found: '${before}'). A stamped style.css must never be committed; bump with 'npm run release'."
            exit 1
          fi
          sed -i -E "s/^(Version: [0-9]+\.[0-9]+\.[0-9]+)$/\1.${{ github.run_number }}/" style.css
          if ! grep -qE '^Version: [0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' style.css; then
            echo "::error::Version stamp did not apply to style.css."
            exit 1
          fi
          echo "  ${before}  ->  $(grep -m1 '^Version:' style.css)"

      # Self-heal: Hostinger sometimes refuses a GitHub runner IP, so we retry
      # the proven action up to 3 times, each attempt landing on a fresh IP.
      - name: Deploy theme via FTP (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          local-dir: ./
          server-dir: /wp-content/themes/agence-marketing-digital/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .vscode/**
            bin/**
            changes/**
            docs/**
            src/**
            CLAUDE.md
            README.md
            ROADMAP.md
            SITEMAP.md
            STRUCTURED-DATA.md
            package.json
            package-lock.json
            tailwind.config.js
            .gitignore
            .gitattributes
            languages/*.po
            languages/*.pot
            assets/images/Screenshot*.png

      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy theme via FTP (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          local-dir: ./
          server-dir: /wp-content/themes/agence-marketing-digital/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .vscode/**
            bin/**
            changes/**
            docs/**
            src/**
            CLAUDE.md
            README.md
            ROADMAP.md
            SITEMAP.md
            STRUCTURED-DATA.md
            package.json
            package-lock.json
            tailwind.config.js
            .gitignore
            .gitattributes
            languages/*.po
            languages/*.pot
            assets/images/Screenshot*.png

      - name: Wait before retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45

      - name: Deploy theme via FTP (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 600000
          local-dir: ./
          server-dir: /wp-content/themes/agence-marketing-digital/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            .vscode/**
            bin/**
            changes/**
            docs/**
            src/**
            CLAUDE.md
            README.md
            ROADMAP.md
            SITEMAP.md
            STRUCTURED-DATA.md
            package.json
            package-lock.json
            tailwind.config.js
            .gitignore
            .gitattributes
            languages/*.po
            languages/*.pot
            assets/images/Screenshot*.png

      - name: Fail job if all attempts failed
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure' && steps.deploy3.outcome == 'failure'
        run: |
          echo "::error::All 3 FTP deploy attempts failed."
          exit 1
